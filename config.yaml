# PHOTO-CAT - Photometric Contamination Analyzer Tool configuration
# You can edit this file manually, or run the starter for your operating system and use the GUI.
# Selecting Catalog CSV in the GUI auto-fills Targets CSV and the output/index folders.
# To use manual source_id targets, set TARGETS_INPUT to null and list IDs under targets.
# Default column names are Gaia-like. Column names are case-sensitive: ra != RA.
# Change them in the GUI only if your CSV headers differ.

build_neighbors_index:
  io:
    input_catalog: C:/Palermo/BSSL/poetry_run/Dati/Dark_patch/dark_patch_135_5-result.csv
    out_dir: C:/Palermo/BSSL/poetry_run/Dati/Dark_patch/output
    KDTREE_FILENAME: ckdtree.pkl
    usecolumns:
    - source_id
    - ra
    - dec
    - phot_g_mean_mag
    columns:
      source_id: source_id
      ra: ra
      dec: dec
      phot_g_mean_mag: phot_g_mean_mag
  settings:
    use_dask: true
    calculate_separations: false
    max_radius_arcsec: 120.0
    chunk_size: 10000
    buffer_flush_interval: 200
query_contamination_from_index:
  io:
    INDEX_DIR: C:/Palermo/BSSL/poetry_run/Dati/Dark_patch/output
    TARGETS_INPUT: C:/Palermo/BSSL/poetry_run/Dati/Dark_patch/dark_patch_135_5-result.csv
    targets: []
    target_source_id_column: source_id
  settings:
    field_of_view_arcsec: 47.0
    delta_mag: 5.0
execution:
  run_build: true
  run_query: true
  replace_running_pipeline: true
