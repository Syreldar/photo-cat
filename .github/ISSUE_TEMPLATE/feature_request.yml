name: Feature request
description: Suggest an improvement for PHOTO-CAT
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Explain what scientific or workflow problem this would solve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behaviour you would like PHOTO-CAT to support.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workaround or alternative design you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, example CSV structure, or scientific context if useful.
