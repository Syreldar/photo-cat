name: Bug report
description: Report a reproducible problem in PHOTO-CAT
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. Please include enough detail to reproduce it.
  - type: input
    id: version
    attributes:
      label: PHOTO-CAT version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact actions or commands that trigger the issue.
      placeholder: |
        1. Run START_WINDOWS.bat
        2. Select catalogue CSV
        3. Click Save + run
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant console output or logs
      description: Paste relevant text from the console or logs/install.log. Remove private paths or data if needed.
      render: text
